# ============================================================
# OKX Quant Framework — 实盘/模拟盘配置
# ============================================================
# 用法: python run_live.py --config configs/paper_trading.yaml
# 覆盖: python run_live.py --config configs/paper_trading.yaml --leverage 10

# --- 交易环境 ---
symbol: "ETH-USDT-SWAP"      # 交易对 (SPOT: ETH-USDT, SWAP: ETH-USDT-SWAP)
timeframe: "15m"              # K 线周期 (1m, 5m, 15m, 30m, 1H, 4H, 1D)
leverage: 20                  # 杠杆倍数 (1-125)

# --- 策略 ---
strategy: "strategies.macro_ema.MacroEmaStrategy"   # 策略类路径 (module.ClassName)

strategy_params:
  fast_period: 10             # 快线 EMA 周期
  slow_period: 40             # 慢线 EMA 周期
  macro_period: 800           # 宏观 EMA 周期 (0=禁用)
  stop_loss_pct: 0.08         # 止损幅度 (8%)
  position_pct: 0.5           # 每笔仓位占总资金比例 (50%)

# --- 风控 ---
risk:
  max_order_value: 50000          # 单笔最大下单金额 (USDT)
  max_total_exposure: 200000      # 总持仓上限 (USDT)
  max_price_deviation: 0.05       # 限价单偏离市价最大幅度 (5%, 防乌龙指)
  max_orders_per_sec: 5           # 每秒最大下单次数 (防暴走)
  max_consecutive_failures: 5     # 连续失败次数 → Kill Switch
  max_slippage_pct: 0.01          # 滑点超阈值 → Kill Switch (1%)
  max_drawdown_pct: 0.20          # 回撤超阈值 → Kill Switch (20%)

# --- 历史数据预加载 ---
preload_bars: 900             # 启动时拉取的历史 K 线数量

# --- 日志 ---
log_level: "INFO"             # DEBUG / INFO / WARNING / ERROR
log_dir: "logs"
