# 投研回测配置模板
# 复制后修改: cp configs/research.example.yaml configs/research.yaml

symbol: "ETH-USDT-SWAP"
timeframe: "15m"
days: 90
strategy: "strategies.macro_ema.MacroEmaStrategy"

strategy_params:
  fast_period: 10
  slow_period: 50
  macro_period: 800
  stop_loss_pct: 0.05
  position_pct: 0.5

initial_capital: 10000
exchange:
  maker_fee_rate: 0.0002
  taker_fee_rate: 0.0005
  slippage_base: 0.0003
  tick_size: 0.01
  latency_bars: 1
  leverage: 20
  contract_multiplier: 1.0
  funding_rate: 0.0001

grid_search:
  fast_periods: [10, 15, 20]
  slow_periods: [30, 40, 50]
  stop_losses: [0.05, 0.08, 0.10]

walk_forward:
  train_pct: 0.7
  overfit_threshold: 0.5
